<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OceanData - Sostenibilidad</title>
    <link rel="stylesheet" href="style.css">

    <script src="scripts.js"></script>
</head>
<body>
    <header>
        <h1>Monitoreo de Sostenibilidad Oceánica</h1>
    </header>

    <main>
        <section id="form-container">
            <h2>Registro de Parámetros</h2>
            <form id="oceanForm">
                <select name="id_ubicacion" required>
                    <option value="1">Arrecife Coralino A</option>
                    <option value="2">Zona Abisal B</option>
                </select>
                <input type="number" step="0.1" name="temp" placeholder="Temp. Agua (°C)" required>
                <input type="number" step="0.01" name="ph" placeholder="Nivel de pH" required>
                <input type="number" name="plasticos" placeholder="Microplásticos (mg/m³)" required>
                <button type="submit">Enviar Datos</button>
            </form>
            <div id="mensaje"></div>
        </section>

        <section id="stats-container">
            <button id="generar">Generar Análisis Estadístico en R</button>
            <div id="resultadoR"></div>
        </section>
    </main>

</body>
</html>
